name: Build & Push Docker images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/${{ github.repository_owner }}/scrappy
  DOCS_IMAGE: ghcr.io/${{ github.repository_owner }}/scrappy-docs

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set version tag
        run: echo "VERSION=$(date +'%Y-%m-%d')-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build docs
        run: npm ci && npm run docs:build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/scrappy:latest
            ghcr.io/${{ env.OWNER }}/scrappy:${{ env.VERSION }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build and push docs image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.docs
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/scrappy-docs:latest
            ghcr.io/${{ env.OWNER }}/scrappy-docs:${{ env.VERSION }}
          cache-from: type=gha,scope=docs
          cache-to: type=gha,mode=max,scope=docs
